name: AlbumTracker
options:
  bundleIdPrefix: com.felipehunas
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
  developmentLanguage: en
  knownRegions: [en, pt-BR]

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: JG9NQWJ2HJ

targets:
  AlbumTracker:
    type: application
    platform: iOS
    sources:
      - path: AlbumTracker
        excludes:
          - "**/.DS_Store"
          - Resources/BundledData
      - path: AlbumTracker/Resources/BundledData
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "What's Missing?"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.felipehunas.AlbumTracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: targeted
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: 1

  AlbumTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AlbumTrackerTests
    dependencies:
      - target: AlbumTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felipehunas.AlbumTrackerTests
        GENERATE_INFOPLIST_FILE: YES
